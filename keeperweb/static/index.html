<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WAN Videos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #ddd; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 8px 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  header h1 { font-size: 1em; font-weight: bold; color: #4af; margin-right: 4px; }
  select, button { background: #222; color: #ddd; border: 1px solid #444; padding: 4px 8px; border-radius: 3px; font: inherit; cursor: pointer; }
  select:hover, button:hover { background: #2e2e2e; }
  .stat { color: #888; font-size: 0.85em; flex: 1; }
  .btn-dl { background: #1a2a1a; border-color: #4c4; color: #4c4; font-weight: bold; }
  .btn-dl:hover { background: #243a24; }
  .btn-refresh { font-size: 0.85em; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  nav { width: 190px; background: #161616; border-right: 1px solid #222; overflow-y: auto; flex-shrink: 0; }
  .folder { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1c1c1c; display: flex; justify-content: space-between; align-items: center; font-size: 0.82em; line-height: 1.3; word-break: break-all; }
  .folder:hover { background: #1e1e1e; }
  .folder.active { background: #1b2a3a; color: #4af; }
  .folder .cnt { color: #555; font-size: 0.85em; flex-shrink: 0; margin-left: 6px; }
  .folder.active .cnt { color: #4af; }

  main { flex: 1; overflow-y: auto; padding: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px; }
  .empty { padding: 40px; text-align: center; color: #555; }

  .card { background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 4px; overflow: hidden; }
  .card.keep { border-color: #3a6a3a; }
  .thumb-wrap { position: relative; background: #000; aspect-ratio: 16/9; overflow: hidden; cursor: pointer; }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-wrap .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.15s; font-size: 2.5em; }
  .thumb-wrap:hover .play-icon { opacity: 1; }
  .thumb-wrap.no-thumb { display: flex; align-items: center; justify-content: center; color: #444; font-size: 2em; }
  .card .info { padding: 6px 8px 8px; }
  .card .name { font-size: 0.78em; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .card .meta { font-size: 0.7em; color: #555; display: flex; gap: 8px; margin-bottom: 6px; }
  .card .actions { display: flex; gap: 5px; }
  .card .actions button, .card .actions a { flex: 1; text-align: center; }
  .card .actions a { display: flex; }
  .card .actions a button { flex: 1; }
  .btn-keep { background: #1a2a1a; border-color: #3a5a3a; color: #8c8; font-size: 0.8em; }
  .btn-keep.on { background: #4c4; color: #111; border-color: #4c4; font-weight: bold; }
  .btn-open { background: #1a1a2a; border-color: #3a3a6a; color: #88c; font-size: 0.8em; }
  .btn-down { background: #1a1a1a; border-color: #444; color: #888; font-size: 0.8em; }
  .btn-down:hover { border-color: #4af; color: #4af; }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 16px; gap: 12px; }
  .modal.show { display: flex; }
  .modal video { max-width: 92vw; max-height: 72vh; background: #000; }
  .minfo { color: #888; font-size: 0.85em; text-align: center; max-width: 80vw; }
  .mactions { display: flex; gap: 10px; }
  .mactions button { padding: 7px 20px; border-radius: 4px; font-size: 0.9em; }
  .m-keep { background: #1a2a1a; border: 1px solid #4c4; color: #4c4; }
  .m-keep.on { background: #4c4; color: #111; font-weight: bold; }
  .m-dl { background: #1a1a2a; border: 1px solid #4af; color: #4af; }
  .m-close { background: #2a1a1a; border: 1px solid #a44; color: #a44; }
  .m-prev, .m-next { background: #1e1e1e; border: 1px solid #444; color: #888; padding: 7px 14px !important; }
  .m-prev:hover, .m-next:hover { border-color: #4af; color: #4af; }
</style>
</head>
<body>

<header>
  <h1>🎬 WAN Videos</h1>
  <select id="filterSel">
    <option value="all">All Videos</option>
    <option value="keepers">⭐ Keepers Only</option>
  </select>
  <select id="sortSel">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
    <option value="name">By Name</option>
  </select>
  <span class="stat" id="stat">Loading…</span>
  <button class="btn-refresh" onclick="refresh()">↺ Refresh</button>
  <button class="btn-dl" id="dlAllBtn">⬇ Download Keepers</button>
</header>

<div class="layout">
  <nav id="sidebar"></nav>
  <main><div class="grid" id="grid"></div></main>
</div>

<div class="modal" id="modal">
  <video id="mVid" controls></video>
  <div class="minfo" id="minfo"></div>
  <div class="mactions">
    <button class="m-prev" id="mPrev">◀</button>
    <button class="m-keep" id="mKeep">⭐ Keep</button>
    <button class="m-dl" id="mDl">⬇ Download</button>
    <button class="m-close" id="mClose">✕ Close</button>
    <button class="m-next" id="mNext">▶</button>
  </div>
</div>

<script>
let videos = [];
let folders = [];
let curFolder = "";
let curFilter = "all";
let curSort = "newest";
let curIdx = -1;
let keepMap = {};

const grid = document.getElementById("grid");
const stat = document.getElementById("stat");
const modal = document.getElementById("modal");
const mVid = document.getElementById("mVid");
const minfo = document.getElementById("minfo");
const mKeep = document.getElementById("mKeep");

// ── folders ──────────────────────────────────────────────
async function loadFolders() {
  const r = await fetch("/api/folders");
  folders = await r.json();
  const nav = document.getElementById("sidebar");
  nav.innerHTML = "";
  for (const f of folders) {
    const d = document.createElement("div");
    d.className = "folder" + (f.folder === curFolder ? " active" : "");
    d.innerHTML = `<span>${f.label || "All Videos"}</span><span class="cnt">${f.count}</span>`;
    d.onclick = () => { curFolder = f.folder; loadVideos(); highlightFolder(); };
    nav.appendChild(d);
  }
}

function highlightFolder() {
  document.querySelectorAll(".folder").forEach((el, i) => {
    el.classList.toggle("active", folders[i] && folders[i].folder === curFolder);
  });
}

// ── videos ───────────────────────────────────────────────
async function loadVideos() {
  let url = `/api/videos?sort=${curSort}`;
  if (curFolder) url += `&folder=${encodeURIComponent(curFolder)}`;
  if (curFilter === "keepers") url += "&filter=keepers";
  const r = await fetch(url);
  videos = await r.json();
  keepMap = {};
  for (const v of videos) if (v.keep) keepMap[v.path] = true;
  renderGrid();
}

async function refresh() {
  await loadFolders();
  await loadVideos();
}

// ── grid ─────────────────────────────────────────────────
function fmt(b) {
  return b > 1e9 ? (b/1e9).toFixed(1)+" GB" : b > 1e6 ? (b/1e6).toFixed(1)+" MB" : (b/1e3).toFixed(0)+" KB";
}
function fmtDate(ts) {
  const d = new Date(ts*1000);
  return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function renderGrid() {
  const keepCount = videos.filter(v => v.keep || keepMap[v.path]).length;
  stat.textContent = `${videos.length} video${videos.length!==1?'s':''} · ${keepCount} keepers`;
  if (!videos.length) { grid.innerHTML = '<div class="empty">No videos found</div>'; return; }
  grid.innerHTML = "";
  for (let i = 0; i < videos.length; i++) grid.appendChild(makeCard(videos[i], i));
}

function makeCard(v, idx) {
  const isKeep = !!(v.keep || keepMap[v.path]);
  const card = document.createElement("div");
  card.className = "card" + (isKeep ? " keep" : "");
  card.dataset.path = v.path;

  const thumbEl = document.createElement("div");
  thumbEl.className = "thumb-wrap";
  const img = document.createElement("img");
  img.loading = "lazy";
  img.onerror = () => { thumbEl.innerHTML = '<span>▶</span>'; thumbEl.classList.add("no-thumb"); };
  img.src = `/thumb/${v.path}`;
  thumbEl.appendChild(img);
  thumbEl.innerHTML += '<div class="play-icon">▶</div>';
  thumbEl.onclick = () => openModal(idx);

  const info = document.createElement("div");
  info.className = "info";
  info.innerHTML = `
    <div class="name" title="${v.filename}">${v.filename}</div>
    <div class="meta"><span>${fmt(v.size)}</span><span>${fmtDate(v.mtime)}</span></div>
    <div class="actions">
      <button class="btn-keep${isKeep?' on':''}" data-path="${v.path}">⭐${isKeep?' Kept':' Keep'}</button>
      <button class="btn-open" onclick="openModal(${idx})">⛶ View</button>
      <a href="/download/${v.path}" download="${v.filename}"><button class="btn-down">⬇</button></a>
    </div>`;

  info.querySelector(".btn-keep").onclick = (e) => { e.stopPropagation(); toggleKeep(v.path, idx); };

  card.appendChild(thumbEl);
  card.appendChild(info);
  return card;
}

// ── keep ─────────────────────────────────────────────────
async function toggleKeep(path, idx) {
  const on = !(keepMap[path]);
  keepMap[path] = on;
  if (videos[idx]) videos[idx].keep = on;
  await fetch(`/api/mark/${path}`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({keep: on})
  });
  const card = document.querySelector(`.card[data-path="${CSS.escape(path)}"]`);
  if (card) {
    card.classList.toggle("keep", on);
    const btn = card.querySelector(".btn-keep");
    btn.className = "btn-keep" + (on ? " on" : "");
    btn.textContent = "⭐" + (on ? " Kept" : " Keep");
  }
  if (curIdx === idx) syncModalKeep(path);
  const keepCount = Object.values(keepMap).filter(Boolean).length;
  stat.textContent = `${videos.length} video${videos.length!==1?'s':''} · ${keepCount} keepers`;
}

// ── modal ─────────────────────────────────────────────────
function openModal(idx) {
  curIdx = idx;
  const v = videos[idx];
  mVid.src = `/video/${v.path}`;
  mVid.play();
  minfo.textContent = `${v.filename}  ·  ${fmt(v.size)}  ·  ${fmtDate(v.mtime)}`;
  syncModalKeep(v.path);
  document.getElementById("mDl").onclick = () => { window.location = `/download/${v.path}`; };
  modal.classList.add("show");
}
function closeModal() {
  modal.classList.remove("show");
  mVid.pause(); mVid.src = "";
  curIdx = -1;
}
function syncModalKeep(path) {
  const on = !!(keepMap[path]);
  mKeep.className = "m-keep" + (on ? " on" : "");
  mKeep.textContent = on ? "⭐ Kept" : "⭐ Keep";
}

document.getElementById("mClose").onclick = closeModal;
document.getElementById("mPrev").onclick = () => { if (curIdx > 0) openModal(curIdx - 1); };
document.getElementById("mNext").onclick = () => { if (curIdx < videos.length - 1) openModal(curIdx + 1); };
mKeep.onclick = () => { if (curIdx >= 0) toggleKeep(videos[curIdx].path, curIdx); };
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
  else if (modal.classList.contains("show")) {
    if (e.key === "ArrowLeft" && curIdx > 0) openModal(curIdx - 1);
    else if (e.key === "ArrowRight" && curIdx < videos.length - 1) openModal(curIdx + 1);
    else if (e.key === "k" || e.key === "K") { if (curIdx >= 0) toggleKeep(videos[curIdx].path, curIdx); }
  }
});

// ── batch download keepers ────────────────────────────────
document.getElementById("dlAllBtn").onclick = async () => {
  let url = `/api/videos?sort=newest&filter=keepers`;
  if (curFolder) url += `&folder=${encodeURIComponent(curFolder)}`;
  const r = await fetch(url);
  const vids = await r.json();
  if (!vids.length) { alert("No keepers found."); return; }
  for (const v of vids) {
    const a = document.createElement("a");
    a.href = `/download/${v.path}`;
    a.download = v.filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    await new Promise(res => setTimeout(res, 400));
  }
};

// ── controls ─────────────────────────────────────────────
document.getElementById("filterSel").onchange = e => { curFilter = e.target.value; loadVideos(); };
document.getElementById("sortSel").onchange = e => { curSort = e.target.value; loadVideos(); };

// ── init ─────────────────────────────────────────────────
loadFolders();
loadVideos();
setInterval(refresh, 30000);
</script>
</body>
</html>
